*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);}
.dash{padding:1rem 0;}
.dash-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;}
.dash-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.25rem;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;}
.kpi-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px;}
.kpi-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;}
.kpi-val{font-size:22px;font-weight:500;color:var(--color-text-primary);}
.kpi-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);margin-top:5px;}
.badge-red{background:#FCEBEB;color:#A32D2D;}
.badge-green{background:#EAF3DE;color:#3B6D11;}
.badge-amber{background:#FAEEDA;color:#854F0B;}
.charts-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;margin-bottom:1.25rem;}
.chart-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px;}
.chart-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:12px;}
.chart-wrap{position:relative;}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--color-text-secondary);}
.legend span{display:flex;align-items:center;gap:4px;}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.heatmap-grid{display:grid;gap:4px;}
.hm-label{font-size:11px;color:var(--color-text-secondary);}
.filters{display:flex;gap:10px;margin-bottom:1rem;align-items:center;flex-wrap:wrap;}
.filter-label{font-size:12px;color:var(--color-text-secondary);}
select{font-size:12px;padding:4px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);}
.full-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px;margin-bottom:1.25rem;}
</style>

  <div class="filters">

  </div>

  <div class="full-card">

  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Order status breakdown</div>
      <div class="legend" id="leg-status"></div>

    <div class="chart-card">
      <div class="chart-title">Error rate &amp; rework by process type (%)</div>
      <div class="chart-wrap" style="height:200px;"><canvas id="chartErr"></canvas></div>
    </div>
  </div>
</div>

const COLS={id:0,proc:1,dept:2,agent:3,pri:4,status:8,sla:9,units:10,errors:11,rework:12,ptime:13,itime:14,region:15,seg:16,cost:17,rev:18};

let charts={};
function destroyAll(){Object.values(charts).forEach(c=>c.destroy());charts={};}

function filtered(){
  const d=document.getElementById('f-dept').value;
  const p=document.getElementById('f-priority').value;
  const r=document.getElementById('f-region').value;
  return RAW.filter(row=>
    (d==='All'||row[COLS.dept]===d)&&
    (p==='All'||row[COLS.pri]===p)&&
    (r==='All'||row[COLS.region]===r)
  );
}

function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}
function sum(arr){return arr.reduce((a,b)=>a+b,0);}

function updateAll(){
  const data=filtered();
  destroyAll();
  renderKPIs(data);
  renderProcessing(data);
  renderRegion(data);
  renderHeatmap(data);
  renderStatus(data);
  renderErrors(data);
}

function renderKPIs(data){
  const total=data.length;
  const completed=data.filter(r=>r[COLS.status]==='Completed').length;
  const breaches=data.filter(r=>r[COLS.sla]==='Yes').length;
  const totalUnits=sum(data.map(r=>+r[COLS.units]));
  const totalRev=sum(data.map(r=>+r[COLS.rev]));
  const totalCost=sum(data.map(r=>+r[COLS.cost]));
  const margin=totalRev>0?((totalRev-totalCost)/totalRev*100):0;
  const avgProc=avg(data.map(r=>+r[COLS.ptime]));
  const slaRate=total>0?breaches/total*100:0;
  const compRate=total>0?completed/total*100:0;

  const kpis=[
    {label:"Completion rate",val:compRate.toFixed(1)+"%",badge:compRate>=80?"badge-green":"badge-red",badgeText:compRate>=80?"On target":"Below target"},
    {label:"SLA breach rate",val:slaRate.toFixed(1)+"%",badge:slaRate>10?"badge-red":"badge-amber",badgeText:slaRate>10?"High risk":"Monitor"},
    {label:"Avg processing time",val:avgProc.toFixed(1)+" hrs",badge:avgProc<20?"badge-green":"badge-red",badgeText:avgProc<20?"Within target":"Exceeds target"},
    {label:"Gross margin",val:margin.toFixed(1)+"%",badge:"badge-green",badgeText:"$"+Math.round((totalRev-totalCost)/1000)+"K profit"},
  ];
  const grid=document.getElementById('kpi-grid');
  grid.innerHTML=kpis.map(k=>`
    <div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-badge ${k.badge}">${k.badgeText}</div>
    </div>`).join('');
}

function renderProcessing(data){
  const procs=["Order Fulfillment","Invoice Processing","Quality Check","Shipment Dispatch","Returns Handling","Vendor Onboarding"];
  const vals=procs.map(p=>{
    const rows=data.filter(r=>r[COLS.proc]===p);
    return rows.length?+avg(rows.map(r=>+r[COLS.ptime])).toFixed(1):0;
  });
  const colors=['#378ADD','#1D9E75','#E24B4A','#EF9F27','#7F77DD','#D4537E'];
  charts.proc=new Chart(document.getElementById('chartProc'),{
    type:'bar',
    data:{labels:procs.map(p=>p.replace(' ','\n')),datasets:[{data:vals,backgroundColor:colors,borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10}},grid:{color:'rgba(128,128,128,0.1)'},title:{display:true,text:'hrs',font:{size:10}}}}}
  });
}

function renderRegion(data){
  const regions=["North","South","East","West","Central"];
  const unitVals=regions.map(r=>sum(data.filter(d=>d[COLS.region]===r).map(d=>+d[COLS.units])));
  const revVals=regions.map(r=>Math.round(sum(data.filter(d=>d[COLS.region]===r).map(d=>+d[COLS.rev]))/1000));
  const leg=document.getElementById('leg-region');
  leg.innerHTML=`<span><span class="leg-dot" style="background:#378ADD"></span>Units processed</span><span><span class="leg-dot" style="background:#1D9E75"></span>Revenue ($K)</span>`;
  charts.region=new Chart(document.getElementById('chartRegion'),{
    type:'bar',
    data:{labels:regions,datasets:[
      {label:'Units',data:unitVals,backgroundColor:'#378ADD',borderRadius:3},
      {label:'Revenue ($K)',data:revVals,backgroundColor:'#1D9E75',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10}},grid:{color:'rgba(128,128,128,0.1)'}}}}
  });
}

function renderHeatmap(data){
  const depts=["Operations","Finance","Quality Assurance","Logistics","Customer Service","Procurement"];
  const pris=["High","Medium","Low"];
  const maxVal=Math.max(...depts.flatMap(d=>pris.map(p=>{
    const rows=data.filter(r=>r[COLS.dept]===d&&r[COLS.pri]===p);
    return rows.length?rows.filter(r=>r[COLS.sla]==='Yes').length/rows.length*100:0;
  })));

  function getColor(val){
    if(val===0) return '#EAF3DE';
    if(val<25) return '#FAC775';
    if(val<50) return '#EF9F27';
    if(val<75) return '#E24B4A';
    return '#A32D2D';
  }
  function getTextColor(val){
    if(val===0) return '#3B6D11';
    if(val<25) return '#633806';
    return '#FFFFFF';
  }

  const container=document.getElementById('heatmap');
  const cellW=Math.floor(100/(depts.length+1));
  let html=`<div style="display:grid;grid-template-columns:auto ${depts.map(()=>'1fr').join(' ')};gap:3px;font-size:11px;">`;
  html+=`<div></div>${depts.map(d=>`<div style="text-align:center;color:var(--color-text-secondary);padding:2px 0;font-weight:500;">${d.replace(' ','\u00A0')}</div>`).join('')}`;
  pris.forEach(p=>{
    html+=`<div style="color:var(--color-text-secondary);padding:4px 8px 4px 0;display:flex;align-items:center;">${p}</div>`;
    depts.forEach(d=>{
      const rows=data.filter(r=>r[COLS.dept]===d&&r[COLS.pri]===p);
      const rate=rows.length?rows.filter(r=>r[COLS.sla]==='Yes').length/rows.length*100:0;
      const bg=getColor(rate);
      const tc=getTextColor(rate);
      html+=`<div style="background:${bg};color:${tc};border-radius:4px;padding:6px 4px;text-align:center;font-weight:500;">${rate>0?rate.toFixed(0)+'%':'—'}</div>`;
    });
  });
  html+=`</div>`;
  html+=`<div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--color-text-secondary);">`;
  [['#EAF3DE','#3B6D11','0%'],['#FAC775','#633806','1–24%'],['#EF9F27','#fff','25–49%'],['#E24B4A','#fff','50–74%'],['#A32D2D','#fff','75%+']].forEach(([bg,tc,label])=>{
    html+=`<span style="display:flex;align-items:center;gap:4px;"><span style="width:12px;height:12px;border-radius:2px;background:${bg};"></span>${label}</span>`;
  });
  html+=`</div>`;
  container.innerHTML=html;
}

function renderStatus(data){
  const statuses=['Completed','Delayed','In Progress','Cancelled'];
  const vals=statuses.map(s=>data.filter(r=>r[COLS.status]===s).length);
  const colors=['#1D9E75','#E24B4A','#378ADD','#888780'];
  const leg=document.getElementById('leg-status');
  leg.innerHTML=statuses.map((s,i)=>`<span><span class="leg-dot" style="background:${colors[i]}"></span>${s} ${vals[i]}</span>`).join('');
  charts.status=new Chart(document.getElementById('chartStatus'),{
    type:'doughnut',
    data:{labels:statuses,datasets:[{data:vals,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false}}}
  });
}

function renderErrors(data){
  const procs=["Order Fulfillment","Invoice Processing","Quality Check","Shipment Dispatch","Returns Handling","Vendor Onboarding"];
  const errRates=procs.map(p=>{
    const rows=data.filter(r=>r[COLS.proc]===p);
    if(!rows.length) return 0;
    const totalUnits=sum(rows.map(r=>+r[COLS.units]));
    const totalErr=sum(rows.map(r=>+r[COLS.errors]));
    return totalUnits>0?+(totalErr/totalUnits*100).toFixed(1):0;
  });
  const reworkRates=procs.map(p=>{
    const rows=data.filter(r=>r[COLS.proc]===p);
    return rows.length?+(rows.filter(r=>r[COLS.rework]==='Yes').length/rows.length*100).toFixed(1):0;
  });
  charts.err=new Chart(document.getElementById('chartErr'),{
    type:'bar',
    data:{labels:procs.map(p=>p.length>14?p.substring(0,13)+'…':p),datasets:[
      {label:'Error rate %',data:errRates,backgroundColor:'#E24B4A',borderRadius:3},
      {label:'Rework rate %',data:reworkRates,backgroundColor:'#EF9F27',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{font:{size:10},boxWidth:10,boxHeight:10}}},
      scales:{x:{ticks:{font:{size:9}},grid:{display:false}},y:{ticks:{font:{size:10}},grid:{color:'rgba(128,128,128,0.1)'},title:{display:true,text:'%',font:{size:10}}}}}
  });
}
